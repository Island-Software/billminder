apiVersion: v1
kind: Service
metadata:
  name: billminder-service
spec:
  type: LoadBalancer
  selector:
    app: billminder-node
  ports:
    - port: 80            # Port inside the cluster
      targetPort: 5000    # Port your .NET app is listening on
      nodePort: 30080     # External port (optional, must be between 30000–32767)
